{% extends "admin/base.html" %}
{% block title %}{{ 'Edit' if cat else 'Add' }} Spare Category{% endblock %}
{% block page_title %}{{ 'Edit' if cat else 'Add' }} Spare Category{% endblock %}
{% block content %}
<div style="max-width:600px;">
  <div class="card">
    <div class="card-header"><h2>{{ 'Edit Category' if cat else 'New Spare Category' }}</h2></div>
    <div class="card-body">
      <form method="POST">
        <div class="form-group"><label>Category Name</label><input type="text" name="name" value="{{ cat.name if cat else '' }}" placeholder="e.g. Sealing & Heating Parts" required></div>
        <div class="form-group"><label>Description</label><textarea name="description" placeholder="What types of parts are in this category?">{{ cat.description if cat else '' }}</textarea></div>
        <div class="flex gap-2">
          <button type="submit" class="btn btn-primary">{{ 'Save Changes' if cat else 'Create Category' }}</button>
          <a href="{{ url_for('admin_spares') }}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
