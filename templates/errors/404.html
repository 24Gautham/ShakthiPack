{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<main style="text-align:center;padding:6rem 2rem;">
  <div style="font-size:5rem;margin-bottom:1rem;">🔍</div>
  <h1 style="font-family:var(--font-head);font-size:3rem;font-weight:800;margin-bottom:1rem;">Page Not Found</h1>
  <p style="color:var(--muted);font-size:1.1rem;margin-bottom:2rem;">The page you're looking for doesn't exist or has been moved.</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary">← Back to Home</a>
</main>
{% endblock %}
